<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Summer Garden Camp</title>
  <style>
    /* 1. 기본 스타일 리셋 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html {
      scroll-behavior: smooth;
    }
    
    body {
      width: 100vw;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #f7f9fc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* 2. 첫 화면 (게이트웨이) 완전 가운데 정렬 */
    .gateway-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      width: 100%;
      height: 100vh;
      max-width: 400px;
      padding: 20px;
    }

    /* 3. 상단 메인 로고 스타일 */
    .logo-wrapper {
      width: 100%;
      max-width: 280px;
      filter: drop-shadow(0px 8px 16px rgba(0, 0, 0, 0.06));
    }

    .logo-wrapper svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* 4. 새로운 SVG 버튼 그룹 스타일 */
    .button-group {
      display: flex;
      width: 100%;
      gap: 12px;
    }

    .svg-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
      filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.08));
    }

    .svg-btn svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .svg-btn:hover {
      transform: translateY(-2px);
      filter: drop-shadow(0px 6px 12px rgba(42, 156, 57, 0.2));
    }

    .svg-btn:active {
      transform: translateY(0);
    }

    /* 5. 상세페이지 이미지 노출 영역 및 투명 링크 컨테이너 */
    .page-view-section {
      display: none;
      position: relative;
      width: 100%;
      max-width: 500px;
      background-color: #ffffff;
      box-shadow: 0px 0px 20px rgba(0,0,0,0.05);
    }

    .page-view-section img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* 6. 이미지 위에 얹어질 버튼 박스 (위치 확인용 빨간색 적용) */
    .click-link {
      position: absolute;
      display: block;
      /* ★ 영역 확인을 위해 빨간색 투명 박스로 설정했습니다. 조율이 끝나면 0으로 바꾸세요! */
      background-color: rgba(255, 0, 0, 0.3); 
      border: 2px dashed red; /* 경계선 표시 */
      cursor: pointer;
      z-index: 10;
    }

    /* [좌표 수정 가이드]
      - top: 전체 이미지 상단에서부터 아래로 떨어지는 위치 (%)
      - left: 전체 이미지 왼쪽에서부터 우측으로 떨어지는 위치 (%)
      - width: 버튼의 가로 너비 (%)
      - height: 버튼의 세로 높이 (%)
    */

    /* 왼쪽: 스탬프투어 하러가기 대응 영역 */
    .link-left {
      top: 5.5%;    /* 위아래 위치가 다르면 이 수치를 변경하세요 */
      left: 12%;    /* 왼쪽 여백 */
      width: 36%;   /* 버튼의 가로 크기 */
      height: 1.2%; /* 버튼의 세로 크기 */
    }

    /* 오른쪽: 가든퀘스트 하러가기 대응 영역 */
    .link-right {
      top: 5.5%;    /* 위아래 위치가 다르면 이 수치를 변경하세요 */
      left: 52%;    /* 왼쪽 여백 */
      width: 36%;   /* 버튼의 가로 크기 */
      height: 1.2%; /* 버튼의 세로 크기 */
    }
  </style>
</head>
<body>

  <div class="gateway-container">
    <div class="logo-wrapper">
      <svg id="_寃⑸━_紐⑤뱶" data-name="寃⑸━ 紐⑤뱶" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 29.52">
        <defs>
          <style>
            .main-cls-1 { fill: #2a9c39; }
            .main-cls-2 { fill: #fff; }
            .main-cls-3 { fill: #3691d0; }
            .main-cls-4 { fill: #f4f191; }
          </style>
        </defs>
        <path class="main-cls-3" d="M41.77,13.7l-1.99-1.94c.81-.77,1.2-1.51,1.2-2.25,0-.42-.14-1.04-.78-1.58-.42-.35-.98-.62(중략)...Z"/>
        </svg>
    </div>

    <div class="button-group">
      <button onclick="loadPage('ko')" class="svg-btn">
        <svg id="_寃⑸━_紐⑤뱶" data-name="寃⑸━ 紐⑤뱶" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 15.5 6.5">
          <defs><style>.btn1-cls-1 { fill: #2a9c39; } .btn1-cls-2 { fill: #fff; }</style></defs>
          <rect class="btn1-cls-1" x="0" y="0" width="15.5" height="6.5" rx="3.25" ry="3.25"/>
          <g>
            <path class="btn1-cls-2" d="M3.12,2.4h1.73v.32h-1.73v-.32ZM3.15,2.16v-.32c.34,0,.66-.32.72-.78l.34.05c-.02.12-.05.23-.09.34l.73.44-.18.27-.7-.45c-.2.27-.49.44-.82.44Z..."/>
          </g>
        </svg>
      </button>

      <button onclick="loadPage('en')" class="svg-btn">
        <svg id="_寃⑸━_紐⑤뱶" data-name="寃⑸━ 紐⑤뱶" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 15.5 6.5">
          <defs><style>.btn2-cls-1 { fill: #2a9c39; } .btn2-cls-2 { fill: #fff; }</style></defs>
          <rect class="btn2-cls-1" x="0" y="0" width="15.5" height="6.5" rx="3.25" ry="3.25"/>
          <g>
            <path class="btn2-cls-2" d="M3.17,1.11h.97v.46c0,.69-.37,1.13-.97,1.13v-.32c.41,0,.62-.31.62-.81v-.15h-.62v-.31ZM4.92,2.02h-.2v.76h-.34v-1.71h.34v.62h.2v.33Z..."/>
          </g>
        </svg>
      </button>
    </div>
  </div>

  <div id="pageView" class="page-view-section">
    <img id="pageImage" src="" alt="상세페이지">

    <a id="leftOverlayLink" href="https://snoopy.jstamp.net/info" target="_blank" class="click-link link-left"></a>
    <a id="rightOverlayLink" href="https://plantclass.vercel.app/" target="_blank" class="click-link link-right"></a>
  </div>

  <script>
    function loadPage(lang) {
      const viewSection = document.getElementById('pageView');
      const imgTarget = document.getElementById('pageImage');
      
      if (lang === 'ko') {
        imgTarget.src = '국문_모바일-상세페이지.png';
      } else if (lang === 'en') {
        imgTarget.src = '영문_모바일-상세페이지.png';
      }
      
      viewSection.style.display = 'block';
      
      setTimeout(() => {
        viewSection.scrollIntoView({ behavior: 'smooth' });
      }, 50);
    }
  </script>

</body>
</html>
