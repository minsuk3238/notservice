<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Summer Garden Camp</title>
  <style>
    /* 1. 기본 스타일 리셋 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html {
      scroll-behavior: smooth;
    }
    
    body {
      width: 100vw;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #f7f9fc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* 2. 첫 화면 (게이트웨이) 완전히 수직/수평 가운데 정렬 */
    .gateway-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      width: 100%;
      height: 100vh; /* 브라우저 화면 높이에 맞춤 */
      max-width: 400px;
      padding: 20px;
    }

    /* 3. 상단 메인 로고 스타일 */
    .logo-wrapper {
      width: 100%;
      max-width: 280px;
      filter: drop-shadow(0px 8px 16px rgba(0, 0, 0, 0.06));
    }

    .logo-wrapper svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* 4. 새로운 SVG 버튼 그룹 스타일 */
    .button-group {
      display: flex;
      width: 100%;
      gap: 12px;
    }

    /* 이미지 형태의 SVG 버튼 최적화 */
    .svg-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
      filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.08));
    }

    .svg-btn svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .svg-btn:hover {
      transform: translateY(-2px);
      filter: drop-shadow(0px 6px 12px rgba(42, 156, 57, 0.2));
    }

    .svg-btn:active {
      transform: translateY(0);
    }

    /* 5. 상세페이지 이미지 노출 영역 및 투명 링크 컨테이너 */
    .page-view-section {
      display: none; /* 첫 화면엔 숨김 */
      position: relative;
      width: 100%;
      max-width: 500px; /* 모바일 가로폭 기준 */
      background-color: #ffffff;
      box-shadow: 0px 0px 20px rgba(0,0,0,0.05);
    }

    .page-view-section img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* 6. 이미지 위에 얹어질 투명 버튼 박스 스타일 */
    .click-link {
      position: absolute;
      display: block;
      background-color: rgba(255, 255, 255, 0); /* 완전 투명 */
      cursor: pointer;
      z-index: 10;
      /* 팁: 영역 확인이 필요할 땐 아래 투명도를 0.3 정도로 바꿔보세요 */
      /* background-color: rgba(255, 0, 0, 0.3); */ 
    }

    /* 국문/영문 공통: 상단 버튼 위치용 좌표 (상단 영역 좌/우 분할) */
    .link-left {
      top: 24%;
      left: 20%;
      width: 28%;
      height: 2.2%;
    }

    .link-right {
      top: 24%;
      left: 52%;
      width: 28%;
      height: 2.2%;
    }
  </style>

  <script>
    function loadPage(lang) {
      const viewSection = document.getElementById('pageView');
      const imgTarget = document.getElementById('pageImage');
      
      if (lang === 'ko') {
        imgTarget.src = '국문_모바일-상세페이지.png';
      } else if (lang === 'en') {
        imgTarget.src = '영문_모바일-상세페이지.png';
      }
      
      viewSection.style.display = 'block';
      
      // 이미지가 뜨고 난 뒤 부드럽게 아래로 스크롤
      setTimeout(() => {
        viewSection.scrollIntoView({ behavior: 'smooth' });
      }, 50);
    }
