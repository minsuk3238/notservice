<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Summer Garden Camp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 1. 기본 스타일 리셋 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html {
      scroll-behavior: smooth;
    }
    
    body {
      width: 100vw;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #f7f9fc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* 2. 첫 화면 (게이트웨이) 완전 가운데 정렬 */
    .gateway-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 35px;
      width: 100%;
      height: 100vh;
      max-width: 400px;
      padding: 20px;
    }

    /* 3. 상단 메인 로고 스타일 */
    .logo-wrapper {
      width: 100%;
      max-width: 280px;
      filter: drop-shadow(0px 8px 16px rgba(0, 0, 0, 0.06));
    }

    .logo-wrapper svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* 4. 고정 텍스트 버튼 스타일 */
    .button-group {
      display: flex;
      width: 100%;
      gap: 16px;
    }

    .btn-text {
      flex: 1;
      padding: 16px 24px;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }

    .btn-ko {
      background-color: #2a9c39;
      color: #ffffff;
    }
    .btn-ko:hover {
      background-color: #227f2e;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(42, 156, 57, 0.2);
    }

    .btn-en {
      background-color: #ffffff;
      color: #333333;
      border: 1px solid #e2e8f0;
    }
    .btn-en:hover {
      background-color: #f8fafc;
      color: #000000;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
    }

    .btn-text:active {
      transform: translateY(0);
    }

    /* 5. 상세페이지 이미지 노출 영역 및 투명 링크 컨테이너 */
    .page-view-section {
      display: none;
      position: relative;
      width: 100%;
      max-width: 500px;
      background-color: #ffffff;
      box-shadow: 0px 0px 20px rgba(0,0,0,0.05);
    }

    .page-view-section img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* 6. 이미지 위에 얹어질 버튼 박스 */
    .click-button {
      position: absolute;
      display: block;
      background-color: rgba(255, 255, 255, 0) !important;
      border: none !important;
      cursor: pointer;
      z-index: 10;
    }

    .link-left {
      left: 26.8% !important;    
      width: 19% !important;   
      height: 0.9% !important;  
    }

    .link-right {
      left: 54.3% !important;    
      width: 19% !important;   
      height: 0.9% !important;  
    }

    /* 번역 방어 핵심 스타일 */
    .responsive-text { 
        word-break: keep-all; 
        overflow-wrap: break-word;
    }
  </style>
</head>
<body>

  <div class="gateway-container">
    <div class="logo-wrapper">
      <svg id="main-gateway-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 29.52">
        <defs>
          <style>
            #main-gateway-logo .logo-paint-green { fill: #2a9c39; }
            #main-gateway-logo .logo-paint-white { fill: #fff; }
            #main-gateway-logo .logo-paint-blue { fill: #3691d0; }
            #main-gateway-logo .logo-paint-yellow { fill: #f4f191; }
          </style>
        </defs>
        <path class="logo-paint-blue" d="M41.77,13.7l-1.99-1.94c.81-.77,1.2-1.51,1.2-2.25,0-.42-.14-1.04-.78-1.58-.42-.35-.98-.62-1.66-.8-.63-.16-1.32-.25-2.07-.25-.44,0-.92.03-1.42.1-.23.03-.42.16-.54.35-.14-.19-.36-.31-.62-.31h-1.91c.12-.09.24-.18.35-.28.45-.4.73-.9.85-1.47.02-.11.03-.24.03-.4,0-.54-.18-1.02-.54-1.44-.28-.32-.63-.59-1.04-.78.08-.02.15-.04.22-.05.3-.05.55-.27.63-.56.08-.3-.03-.61-.27-.8l-1.33-1.06c-.2-.16-.47-.21-.72-.13-.98.32-1.86.8-2.62,1.41-.18.14-.34.29-.49.45-.09-.21-.22-.42-.38-.61-.33-.39-.78-.7-1.34-.91-.52-.2-1.11-.31-1.73-.31-.97,0-1.94.25-2.87.75-.07.04-.14.09-.19.14-.29-.23-.61-.43-.97-.57-.53-.21-1.08-.32-1.64-.32-.61,0-1.2.13-1.74.38-.51.24-.95.58-1.29,1.01-.04-.05-.08-.11-.13-.16-.33-.39-.78-.7-1.34-.91-.52-.2-1.11-.31-1.73-.31-.97,0-1.94.25-2.87.75-.19.1-.33.28-.39.49-.05.21-.01.44.11.62l.8,1.18c.23.33.67.44,1.02.24.61-.35,1-.42,1.22-.42.11,0,.22.02.32.06.02.05.04.1.04.13,0,.02,0,.07-.07.15-.12.14-.28.27-.46.37-.23.14-.53.3-.89.48-.33.16-.58.29-.76.4-.3.17-.5.37-.62.6-.05.1-.08.2-.09.31l-.1,1.46s0,.08,0,.12h-1.1c-.2,0-.39.08-.53.21-.09-.08-.21-.14-.34-.17-.36-.08-.77-.15-1.22-.2-.45-.05-.91-.08-1.36-.08-1.44,0-2.5.29-3.24.9-.68.56-.82,1.16-.82,1.57,0,.49.18.96.54,1.4.19.23.4.45.64.64-.24.03-.47.17-.59.39l-.86,1.57c-.1.19-.12.42-.05.62.07.21.23.37.43.46.49.21,1.05.39,1.66.53.23.05.46.1.69.13-.19.15-.37.31-.54.5-.43.48-.7,1.05-.82,1.7-.07.42-.11.84-.11,1.26,0,.99.24,1.8.71,2.42.49.63,1.2,1.03,2.13,1.2.43.08.84.12,1.23.12.97,0,1.78-.24,2.43-.72.02.09.05.18.1.27.03.05.07.1.11.14-.15.11-.29.22-.41.35-.64.66-.96,1.57-.96,2.7,0,.18,0,.32.01.42.07,1.23.4,2.23.99,2.98.62.8,1.54,1.2,2.75,1.2.04,0,.08,0,.13,0,.84-.03,1.62-.29,2.31-.77.15-.1.29-.21.43-.33-.02.17.01.34.1.49.14.23.39.38.66.38h2.04c.34,0,.64-.22.74-.54l.46-1.48h.47s.44,1.39.44,1.39c.12.38.51.6.89.52l1.84-.39c.13.24.38.4.67.4h1.9c.43,0,.77-.35.77-.77v-.82s.04,0,.06,0l.99.03c.07,0,.14,0,.2-.02v1.02c0,.43.35.77.77.77h2.06c.19,0,.37-.07.51-.2.12.07.26.12.41.12h1.66c.41,0,.75-.33.77-.74l.06-1.56c.27-.1.57-.23.88-.39.57-.29,1.07-.64,1.49-1.06.52-.51.78-1.07.78-1.67s-.26-1.13-.78-1.6c-.12-.12-.26-.23-.42-.32.06-.02.12-.05.17-.09.13.09.28.14.45.14h1.86c.21,0,.41-.09.56-.24.07-.07.12-.15.16-.24l.02.05c.13.27.4.44.7.44h1.86c.21,0,.41-.08.55-.23.15-.15.22-.35.22-.56l-.17-6.22h1.11c.31,0,.6-.19.71-.48.12-.29.05-.62-.18-.84Z"/>
        </svg>
    </div>

    <div class="button-group">
      <button onclick="loadPage('ko')" class="btn-text btn-ko">한글</button>
      <button onclick="loadPage('en')" class="btn-text btn-en">ENGLISH</button>
    </div>
  </div>

  <div id="pageView" class="page-view-section">
    <img id="pageImage" src="" alt="상세페이지">
    
    <button id="leftOverlayLink" onclick="clickLeftButton()" class="click-button link-left"></button>
    <button id="rightOverlayLink" onclick="clickRightButton()" class="click-button link-right"></button>
  </div>

  <div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
      <div class="bg-white rounded-3xl p-6 md:p-8 max-w-sm w-full shadow-2xl relative">
          <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
          <div id="modal-icon" class="w-16 h-16 md:w-20 md:h-20 mx-auto rounded-full flex items-center justify-center mb-6 text-4xl md:text-5xl"></div>
          <h3 id="modal-title" class="text-xl md:text-2xl font-bold text-center mb-4 text-[#040000]"></h3>
          <p id="modal-desc" class="text-slate-600 text-center text-xs md:text-sm mb-6 italic leading-relaxed"></p>
          <div id="modal-content" class="text-slate-700 mb-8 space-y-4 text-xs md:text-sm bg-slate-50 p-4 md:p-6 rounded-2xl"></div>
          <a id="modal-link" href="#" target="_blank" class="block w-full text-center text-white py-3 md:py-4 rounded-xl font-bold hover:opacity-90 transition-opacity">바로가기</a>
      </div>
  </div>

  <script>
    // 현재 활성화된 언어 상태 ('ko' 또는 'en')
    let currentLang = 'ko';

    function loadPage(lang) {
      currentLang = lang;
      const viewSection = document.getElementById('pageView');
      const imgTarget = document.getElementById('pageImage');
      const leftLink = document.getElementById('leftOverlayLink');
      const rightLink = document.getElementById('rightOverlayLink');
      
      if (lang === 'ko') {
        imgTarget.src = '국문_모바일-상세페이지.png';
        leftLink.style.top = '15.5%';
        rightLink.style.top = '15.5%';
      } else if (lang === 'en') {
        imgTarget.src = '영문_모바일-상세페이지.png';
        leftLink.style.top = '15.3%';
        rightLink.style.top = '15.3%';
      }
      
      viewSection.style.display = 'block';
      
      setTimeout(() => {
        viewSection.scrollIntoView({ behavior: 'smooth' });
      }, 50);
    }

    // 왼쪽 버튼 (가든 스탬프 투어) 클릭 시 데이터 바인딩
    function clickLeftButton() {
      if (currentLang === 'ko') {
        openModal(
          '가든 스탬프 투어', 
          'https://snoopy.jstamp.net/login', 
          '🐾', 
          '#008fd5', 
          '발바닥 모양을 눌러 스탬프를 찍고,<br>퀴즈를 풀어 스탬프를 모아보세요.', 
          [
            '카카오톡, Google, Apple 계정으로 로그인합니다.', 
            '스탬프 투어 메뉴를 클릭하세요.', 
            '발바닥 아이콘을 누르고, 가든 곳곳에 비치된 스탬프를 찍어보세요.', 
            '스탬프 8개를 모두 모으면, 스토어에서 소정의 기념품을 받을 수 있습니다.'
          ]
        );
      } else {
        // 영문 모드일 때 띄워줄 다국어 데이터 예시
        openModal(
          'Garden Stamp Tour', 
          'https://snoopy.jstamp.net/login', 
          '🐾', 
          '#008fd5', 
          'Press the footprint to stamp,<br>solve quizzes, and collect stamps.', 
          [
            'Log in with Kakao, Google, or Apple accounts.', 
            'Click on the Stamp Tour menu.', 
            'Press the footprint icon and stamp at designated spots throughout the garden.', 
            'Collect all 8 stamps to get a small souvenir at the store.'
          ]
        );
      }
    }

    // 오른쪽 버튼 (가드너 클래스) 클릭 시 데이터 바인딩
    function clickRightButton() {
      if (currentLang === 'ko') {
        openModal(
          '가드너 클래스: 나무 찾기 미션', 
          'https://plantclass.vercel.app', 
          '🌿', 
          '#2c9942', 
          '야외 가든 지도를 열고<br>반짝이는 핀을 찾아가세요!<br>나무 설명을 읽고 퀴즈를 풀어보세요!', 
          [
            '지도에 표시된 핀을 순서대로 따라가 보세요.', 
            '각 나무에 해당하는 퀴즈를 모두 풀어보세요.', 
            '최종 테스트를 완료하고 디지털 인증서를 받아보세요!', 
            '설문 완료 화면을 매표소에 제시하면 소정의 리워드를 수령할 수 있습니다.'
          ]
        );
      } else {
        // 영문 모드일 때 띄워줄 다국어 데이터 예시
        openModal(
          'Gardener Class: Tree Mission', 
          'https://plantclass.vercel.app', 
          '🌿', 
          '#2c9942', 
          'Open the outdoor garden map<br>and find the glowing pins!<br>Read tree descriptions and solve quizzes!', 
          [
            'Follow the pins on the map in sequence.', 
            'Solve all the quizzes for each tree.', 
            'Complete the final test to receive a digital certificate!', 
            'Present the survey completion screen at the ticket office to get a reward.'
          ]
        );
      }
    }

    // 공용 모달 제어 함수
    function openModal(title, url, icon, color, desc, steps) {
        const modal = document.getElementById('modal');
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-desc').innerHTML = desc;
        document.getElementById('modal-link').href = url;
        document.getElementById('modal-icon').innerText = icon;
        document.getElementById('modal-content').innerHTML = steps.map((step, index) => `
            <div class="flex items-start gap-3">
                <span class="flex-shrink-0 font-extrabold text-[10px] md:text-xs px-2 py-1 rounded-md bg-slate-200 text-slate-600">Step ${index + 1}</span>
                <span class="leading-relaxed break-keep text-slate-700 responsive-text">${step}</span>
            </div>
        `).join('');
        
        const iconEl = document.getElementById('modal-icon');
        iconEl.style.backgroundColor = color + '15';
        iconEl.style.color = color;
        document.getElementById('modal-link').style.backgroundColor = color;
        modal.classList.remove('hidden');
    }

    function closeModal() { 
        document.getElementById('modal').classList.add('hidden'); 
    }
  </script>
</body>
</html>
