<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Summer Garden Camp</title>
  <style>
    /* 1. 기본 스타일 리셋 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html {
      scroll-behavior: smooth;
    }
    
    body {
      width: 100vw;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #f7f9fc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* 2. 첫 화면 (게이트웨이) 완전히 수직/수평 가운데 정렬 */
    .gateway-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      width: 100%;
      height: 100vh;
      max-width: 400px;
      padding: 20px;
    }

    /* 3. 상단 메인 로고 스타일 */
    .logo-wrapper {
      width: 100%;
      max-width: 280px;
      filter: drop-shadow(0px 8px 16px rgba(0, 0, 0, 0.06));
    }

    .logo-wrapper svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* 4. 새로운 SVG 버튼 그룹 스타일 */
    .button-group {
      display: flex;
      width: 100%;
      gap: 12px;
    }

    .svg-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
      filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.08));
    }

    .svg-btn svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .svg-btn:hover {
      transform: translateY(-2px);
      filter: drop-shadow(0px 6px 12px rgba(42, 156, 57, 0.2));
    }

    .svg-btn:active {
      transform: translateY(0);
    }

    /* 5. 상세페이지 이미지 노출 영역 및 투명 링크 컨테이너 */
    .page-view-section {
      display: none;
      position: relative;
      width: 100%;
      max-width: 500px;
      background-color: #ffffff;
      box-shadow: 0px 0px 20px rgba(0,0,0,0.05);
    }

    .page-view-section img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* 6. 이미지 위에 얹어질 투명 버튼 박스 스타일 */
    .click-link {
      position: absolute;
      display: block;
      background-color: rgba(255, 255, 255, 0);
      cursor: pointer;
      z-index: 10;
    }

    .link-left {
      top: 24%;
      left: 20%;
      width: 28%;
      height: 2.2%;
    }

    .link-right {
      top: 24%;
      left: 52%;
      width: 28%;
      height: 2.2%;
    }
  </style>
</head>
